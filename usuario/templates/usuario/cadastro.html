{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Denúncias Urbanas</title>
  <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <form  method="POST">
      <a href="{% url 'index' %}" class="home-link" aria-label="Voltar para a página inicial">
        <span aria-hidden="true">←</span>
        Início
      </a>
      {% csrf_token %}
      {% if messages %}
        <div class="errors-container" role="alert" aria-live="polite">
          {% for message in messages %}
            <div class="erro">
              <span class="erro-icon">!</span>
              <span>{{ message }}</span>
            </div>
          {% endfor %}
        </div>
      {% endif %}
      <h2>Informações de cadastro</h2>
      <div>
        <fieldset>
          <label for="email">Seu E-mail: <span class="required-text">(obrigatório)</span></label>
          <input type="email" id="email" name="email" placeholder="Email" value="{{ email }}" required>
        </fieldset>
      </div>
      <div>
  <fieldset>
    <label for="senha">Sua Senha: <span class="required-text">(obrigatório)</span></label>
    <input type="password" id="senha" name="senha" placeholder="Senha" required>
  </fieldset>
</div>
      <div>
  <fieldset>
    <label for="repetir_senha">Repetir Senha: <span class="required-text">(obrigatório)</span></label>
    <input type="password" id="repetir_senha" name="repetir_senha" placeholder="Senha" required>
  </fieldset>
</div>
      <div>
        <fieldset>
          <label for="nome">Seu Nome: <span class="required-text">(obrigatório)</span></label>
          <input type="text" id="nome" name="nome" placeholder="Nome" minlength="3" maxlength="100" value="{{ nome }}" required>
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="cpf">Seu CPF: <span class="optional-text">(opcional)</span></label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" minlength="14" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" value="{{ cpf }}" inputmode="numeric" autocomplete="off">
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="telefone">Seu Telefone: <span class="optional-text">(opcional)</span></label>
          <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" minlength="14" maxlength="15" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" value="{{ telefone }}" inputmode="numeric" autocomplete="off">
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="nascimento">Sua Data de Nascimento: <span class="required-text">(obrigatório)</span></label>
          <input type="date" id="nascimento" name="nascimento" value="{{ nascimento }}" required>
        </fieldset>
      </div>

      <fieldset>
        <legend>Gênero <span class="optional-text">(opcional)</span></legend>
        <div class="radio-group">
          <div>
            <input type="radio" id="masc" name="genero" value="m">
            <label for="masc">Masculino</label>
          </div>
          <div>
            <input type="radio" id="fem" name="genero" value="f">
            <label for="fem">Feminino</label>
          </div>
          <div>
            <input type="radio" id="outro" name="genero" value="outro">
            <label for="outro">Outro</label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Termos e Condições</legend>
        <textarea id="message" name="message" rows="6" readonly>Este é um texto para leitura.
Ao realizar o cadastro, você concorda com os termos estabelecidos pela plataforma de acordo com a LGPD (Lei de Proteção Geral de Dados).</textarea>
        <div style="margin-top: 16px;">
          <input type="checkbox" id="termos" name="termos" required>
          <label for="termos">Declaro que li e aceito os termos de uso <span class="required-text">(obrigatório)</span></label>
        </div>
      </fieldset>

      <button value = "cadastro" type="submit">Cadastrar</button>
      <button type="reset">Limpar</button>

      <div class="login-link">
        <p>Já tem uma conta? <a href="{% url 'usuario:login' %}">Entrar</a></p>
      </div>


    </form>

  </main>

  <script>
    const cpfInput = document.getElementById('cpf');
    const telefoneInput = document.getElementById('telefone');

    cpfInput.addEventListener('input', () => {
      let valor = cpfInput.value.replace(/\D/g, '').slice(0, 11);

      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
      valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      cpfInput.value = valor;
    });

    telefoneInput.addEventListener('input', () => {
      let valor = telefoneInput.value.replace(/\D/g, '').slice(0, 11);

      if (valor.length <= 10) {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{4})(\d)/, '$1-$2');
      } else {
        valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
        valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
      }

      telefoneInput.value = valor;
    });
  </script>
  <script src="javaScript/formulario-denuncia.js"></script>
</body>

</html>

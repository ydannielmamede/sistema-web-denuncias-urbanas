<!DOCTYPE html>
{% load static %}
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Denúncias Urbanas</title>
    <meta name="description" content="Formulário de login com efeito glassmorphism, rótulos flutuantes e login social.">
    <meta name="author" content="Denúncias Urbanas">
    <link rel="canonical" href="https://puikinsh.github.io/login-forms/forms/glassmorphism/">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%236366f1'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>L</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Login - Denúncias Urbanas">
    <meta property="og:description" content="Formulário de login com efeito glassmorphism, rótulos flutuantes e login social.">
    <meta property="og:url" content="https://puikinsh.github.io/login-forms/forms/glassmorphism/">
    <meta property="og:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/glassmorphism.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Login - Denúncias Urbanas">
    <meta name="twitter:description" content="Formulário de login com efeito glassmorphism, rótulos flutuantes e login social.">
    <meta name="twitter:image" content="https://puikinsh.github.io/login-forms/assets/screenshots/glassmorphism.png">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Bem-vindo</h2>
                <p>Entre na sua conta</p>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Endereço de Email</label>
                        <span class="focus-border"></span>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Senha</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Alternar visibilidade da senha">
                            <span class="eye-icon"></span>
                        </button>
                        <span class="focus-border"></span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkbox-label">
                            <span class="checkmark"></span>
                            Lembrar de mim
                        </span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn btn">
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loader"></span>
                </button>
            </form>

            <div class="divider">
                <span>Ou continuar com..</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn google-btn">
                    <span class="social-icon google-icon"></span>
                    Google
                </button>
                <button type="button" class="social-btn github-btn">
                    <span class="social-icon github-icon"></span>
                    GitHub
                </button>
            </div>

            <div class="signup-link">
                <p>Ainda não tem uma conta? <a href="#">Cadastre-se</a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <h3>Login realizado com sucesso!</h3>
                <p>Redirecionando para o painel...</p>
            </div>
        </div>
    </div>

    <script src="{% static 'js/form-utils.js' %}"></script>
    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>

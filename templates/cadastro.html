{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Denúncias Urbanas</title>
  <link rel="stylesheet" href="{% static 'css/cadastro.css' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <form action="{% url 'usuario:cadastro' %}" method="POST">
      {% csrf_token %}
      <h2>Informações de cadastro</h2>
      <div>
        <fieldset>
          <label for="email">Seu E-mail:</label>
          <input type="email" id="email" name="email" placeholder="Email" required>
        </fieldset>
      </div>
      <div>
  <fieldset>
    <label for="senha">Sua Senha:</label>
    <input type="password" id="senha" name="senha" placeholder="Senha" required>
  </fieldset>
</div>
      <div>
  <fieldset>
    <label for="repetir_senha">Repetir Senha:</label>
    <input type="password" id="repetir_senha" name="repetir_senha" placeholder="Senha" required>
  </fieldset>
</div>
      <div>
        <fieldset>
          <label for="nome">Seu Nome:</label>
          <input type="text" id="nome" name="nome" placeholder="Nome" minlength="3" maxlength="100" required>
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="cpf">Seu CPF:</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" minlength="11" maxlength="14" pattern="\d{3}\.?\d{3}\.?\d{3}-?\d{2}" required>
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="telefone">Seu Telefone:</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" minlength="10" maxlength="20" pattern="\(?\d{2}\)?\s?\d{4,5}-?\d{4}" required>
        </fieldset>
      </div>
      <div>
        <fieldset>
          <label for="nascimento">Sua Data de Nascimento:</label>
          <input type="date" id="nascimento" name="nascimento" required>
        </fieldset>
      </div>

      <fieldset>
        <legend>Gênero</legend>
        <div class="radio-group">
          <div>
            <input type="radio" id="masc" name="genero" value="m">
            <label for="masc">Masculino</label>
          </div>
          <div>
            <input type="radio" id="fem" name="genero" value="f">
            <label for="fem">Feminino</label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Termos e Condições</legend>
        <textarea id="message" name="message" rows="6" readonly>Este é um texto para leitura.
Ao realizar o cadastro, você concorda com os termos estabelecidos pela plataforma de acordo com a LGPD (Lei de Proteção Geral de Dados).</textarea>
        <div style="margin-top: 16px;">
          <input type="checkbox" id="termos" name="termos" required>
          <label for="termos">Declaro que li e aceito os termos de uso</label>
        </div>
      </fieldset>

      <button value = "cadastrar" type="submit">Cadastrar</button>
      <button type="reset">Limpar</button>

      <div class="login-link">
        <p>Já tem uma conta? <a href="{% url 'usuario:login' %}">Entrar</a></p>
      </div>


    </form>

  </main>

  <script src="javaScript/formulario-denuncia.js"></script>
</body>

</html>
